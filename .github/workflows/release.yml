name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME -match '^v\d') {
            $env:GITHUB_REF_NAME
          } else {
            '${{ inputs.tag }}'
          }
          $version = $tag.TrimStart('v')
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore

      # Optional: materialize appsettings.Production.json from a repo secret so the
      # CI-built exe can ship with the supplier API key embedded. The file is
      # gitignored — without DICTIONARY_API_KEY the publish still succeeds but the
      # produced exe will not contain the production key (Dictionary feature will
      # need an env-var or LocalAppData override at runtime).
      - name: Materialize appsettings.Production.json
        if: ${{ env.DICTIONARY_API_KEY != '' }}
        env:
          DICTIONARY_API_KEY: ${{ secrets.DICTIONARY_API_KEY }}
          DICTIONARY_BASE_URL: ${{ secrets.DICTIONARY_BASE_URL }}
        shell: pwsh
        run: |
          $payload = @{
            Dictionary = @{
              ApiKey = $env:DICTIONARY_API_KEY
              BaseUrl = $env:DICTIONARY_BASE_URL
            }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path src/GUI.WinForms/appsettings.Production.json -Value $payload -Encoding utf8

      # Heavy steps below are guarded on DICTIONARY_API_KEY / RELEASE_VIA_CI. Without
      # one of those, the workflow exits successfully without producing or uploading
      # anything — the operator does the release locally with the keyed exe via
      # `gh release create`. ('secrets' and 'vars' contexts are only available in
      # step-level if-expressions, never job-level.)
      - name: Publish (win-x64, self-contained, single file)
        if: ${{ vars.RELEASE_VIA_CI == 'true' || secrets.DICTIONARY_API_KEY != '' }}
        run: |
          dotnet publish src/GUI.WinForms/GUI.WinForms.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish/win-x64

      - name: Package
        id: package
        if: ${{ vars.RELEASE_VIA_CI == 'true' || secrets.DICTIONARY_API_KEY != '' }}
        shell: pwsh
        run: |
          # The publish folder contains exactly one file (the bundled exe). Upload
          # both the bare exe and a zipped version — the supplier wants the bare exe,
          # the zip mirrors the prior release-asset naming convention.
          $exe = "stem-button-panel-tester-${{ steps.version.outputs.tag }}-win-x64.exe"
          $zip = "stem-button-panel-tester-${{ steps.version.outputs.tag }}-win-x64.zip"
          Copy-Item -Path publish/win-x64/GUI.WinForms.exe -Destination $exe
          Compress-Archive -Path publish/win-x64/* -DestinationPath $zip
          "exe=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Extract changelog entry
        id: changelog
        if: ${{ vars.RELEASE_VIA_CI == 'true' || secrets.DICTIONARY_API_KEY != '' }}
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\r\n]*\r?\n(.*?)(?=^## \[|\z)"
          $match = [regex]::Match($content, $pattern)
          if ($match.Success) {
              $body = $match.Groups[1].Value.Trim()
              $body | Out-File -FilePath release-notes.md -Encoding utf8
          } else {
              "Release $version" | Out-File -FilePath release-notes.md -Encoding utf8
          }

      - name: Create GitHub Release
        if: ${{ vars.RELEASE_VIA_CI == 'true' || secrets.DICTIONARY_API_KEY != '' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: |
            ${{ steps.package.outputs.exe }}
            ${{ steps.package.outputs.zip }}
