name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC — catches dependency drift on idle repos.
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache Lean toolchain
        if: hashFiles('lean-toolchain') != ''
        uses: actions/cache@v5
        with:
          path: ~/.elan
          key: ${{ runner.os }}-elan-${{ hashFiles('lean-toolchain') }}

      - name: Restore
        run: dotnet restore

      # No --framework filter: it overrides per-project TFMs and breaks legacy
      # net10.0-windows projects. The Linux test leg below enforces the
      # cross-platform contract (Tests are net10.0-only).
      - name: Build (cross-platform leg)
        if: runner.os == 'Linux'
        run: dotnet build --configuration Release --no-restore

      - name: Build (full leg, includes net10.0-windows)
        if: runner.os == 'Windows'
        run: dotnet build --configuration Release --no-restore

      # Whitespace-only check: the analyzer phase of `dotnet format` chokes
      # on C# files that reference types from F# projects (Roslyn's
      # MSBuildWorkspace doesn't fully resolve cross-language refs on the
      # CI runner image even after build, though it works locally). Whitespace
      # is what we actually want enforced; analyzer/style violations are
      # caught by the build's TreatWarningsAsErrors.
      - name: Verify formatting (whitespace)
        run: dotnet format whitespace --verify-no-changes --no-restore

      - name: Test (cross-platform leg)
        if: runner.os == 'Linux'
        run: dotnet test --framework net10.0 --configuration Release --no-build --filter "Category!=RequiresHardware&Category!=RequiresWindows&Category!=FlakyOnCi" --logger "trx;LogFileName=test-results.trx"

      - name: Test (full leg)
        if: runner.os == 'Windows'
        run: dotnet test --configuration Release --no-build --filter "Category!=RequiresHardware&Category!=FlakyOnCi" --logger "trx;LogFileName=test-results.trx"

      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Tests (${{ matrix.os }})
          path: '**/test-results.trx'
          reporter: dotnet-trx
